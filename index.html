<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>دردشة • المحادثات</title>
  <!-- خطوط وأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== متغيرات وأساسيات ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #008080;
      --deep-blue: #0A2540;
      --off-white: #F7F9FC;
      --accent-pink: #E1306C;  /* لمسة انستغرام */
      --bubble-her: #FFE4E9;
      --text-dark: #1E2A3A;
      --text-secondary: #6B7A8A;
      --border-light: rgba(0,0,0,0.05);
      --shadow-card: 0 8px 20px rgba(0,0,0,0.03);
      --nav-bg: rgba(255,255,255,0.85);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #D6E3ED;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }

    /* الحاوية الرئيسية (محاكاة شاشة الهاتف) */
    .app-container {
      max-width: 400px;
      width: 100%;
      height: 780px;
      max-height: 95vh;
      background: var(--off-white);
      border-radius: 36px;
      box-shadow: 0 30px 50px -15px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
      /* نسيج خفيف */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0,128,128,0.02) 0%, transparent 30%),
        repeating-linear-gradient(45deg, rgba(10,37,64,0.01) 0px, rgba(10,37,64,0.01) 1px, transparent 1px, transparent 10px);
    }

    /* ========== الهيدر ========== */
    .main-header {
      padding: 20px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .main-header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--teal), var(--deep-blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .header-icons {
      display: flex;
      gap: 18px;
    }

    .header-icons i {
      font-size: 22px;
      color: var(--deep-blue);
      opacity: 0.8;
      cursor: pointer;
      transition: 0.15s;
    }

    .header-icons i:hover {
      color: var(--teal);
      opacity: 1;
    }

    /* ========== شريط البحث ========== */
    .search-section {
      padding: 8px 16px 16px;
    }

    .search-container {
      background: white;
      border-radius: 30px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,128,128,0.1);
      backdrop-filter: blur(4px);
    }

    .search-container i {
      color: var(--teal);
      font-size: 18px;
    }

    .search-container input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      padding: 6px 0;
    }

    .search-container input::placeholder {
      color: #A0B0C0;
      font-weight: 400;
    }

    /* ========== قائمة المحادثات ========== */
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 14px 12px;
      background: white;
      border-radius: 24px;
      box-shadow: var(--shadow-card);
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(2px);
      margin-bottom: 2px;
    }

    .chat-item:hover {
      background: #FFFFFFF0;
      transform: translateY(-2px);
      box-shadow: 0 12px 18px -8px rgba(0,128,128,0.08);
    }

    /* صورة البروفايل بأسلوب انستغرام */
    .chat-avatar {
      position: relative;
      margin-left: 14px;
    }

    .avatar-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--deep-blue);
      border: 2px solid white;
    }

    /* محتوى المحادثة */
    .chat-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .chat-header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .chat-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--deep-blue);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .chat-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .chat-last-message {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .last-message-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      font-weight: 400;
    }

    .message-status {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .unread-badge {
      background: var(--teal);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 30px;
      min-width: 20px;
      text-align: center;
    }

    .double-check {
      color: var(--teal);
      font-size: 14px;
      opacity: 0.7;
    }

    /* قصة/حالة (ستوري) */
    .story-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2ecc71;
      border: 2px solid white;
      position: absolute;
      bottom: 0;
      left: 0;
    }

    /* ========== شريط التنقل السفلي ========== */
    .bottom-nav {
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      padding: 10px 20px 16px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(0,128,128,0.1);
      margin-top: 4px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-secondary);
      transition: 0.15s;
      font-size: 12px;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: none;
    }

    .nav-item i {
      font-size: 24px;
    }

    .nav-item.active {
      color: var(--teal);
      font-weight: 600;
    }

    .nav-item span {
      font-size: 11px;
    }

    /* حالة فارغة للبحث */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    /* تحسينات للجوال */
    @media (max-width: 380px) {
      .app-container {
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }
      body { padding: 0; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- الهيدر الرئيسي -->
  <header class="main-header">
    <h1>دردشة</h1>
    <div class="header-icons">
      <i class="fas fa-camera" title="القصص"></i>
      <i class="fas fa-ellipsis-h" title="المزيد"></i>
    </div>
  </header>

  <!-- شريط البحث -->
  <div class="search-section">
    <div class="search-container">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="بحث في المحادثات..." autocomplete="off">
    </div>
  </div>

  <!-- قائمة المحادثات -->
  <div class="chats-list" id="chatsListContainer">
    <!-- سيتم إنشاء العناصر ديناميكيًا عبر JavaScript -->
  </div>

  <!-- شريط التنقل السفلي (Navigation) -->
  <nav class="bottom-nav">
    <a class="nav-item active" data-page="chats">
      <i class="fas fa-comment-dots"></i>
      <span>المحادثات</span>
    </a>
    <a class="nav-item" data-page="contacts">
      <i class="fas fa-address-book"></i>
      <span>جهات الاتصال</span>
    </a>
    <a class="nav-item" data-page="settings">
      <i class="fas fa-cog"></i>
      <span>الإعدادات</span>
    </a>
  </nav>
</div>

<script>
  (function(){
    "use strict";

    // ---------- البيانات التجريبية للمحادثات ----------
    const chatsData = [
      {
        id: 1,
        name: 'حبيبتي ❤️',
        avatar: 'fa-heart',
        avatarColor: '#FFE4E9',
        lastMessage: 'خلاص متفقين، هبعتلك اللوكيشن',
        time: '10:10 ص',
        unread: 2,
        isOnline: true,
        isRead: false,
        hasStory: true,
        link: 'chat.html'  // رابط صفحة المحادثة الداخلية
      },
      {
        id: 2,
        name: 'أحمد (العمل)',
        avatar: 'fa-user-tie',
        avatarColor: '#E3F2FD',
        lastMessage: 'تم إرسال التقرير الأسبوعي ✅',
        time: 'أمس',
        unread: 0,
        isOnline: false,
        isRead: true,
        hasStory: false,
        link: 'chat.html'
      },
      {
        id: 3,
        name: 'مجموعة المصممين',
        avatar: 'fa-users',
        avatarColor: '#E8F5E9',
        lastMessage: 'سارة: التصميم النهائي جاهز 🎨',
        time: 'أمس',
        unread: 5,
        isOnline: false,
        isRead: false,
        hasStory: false,
        link: 'chat.html'
      },
      {
        id: 4,
        name: 'محمد علي',
        avatar: 'fa-user-graduate',
        avatarColor: '#FFF3E0',
        lastMessage: 'شكراً على المساعدة!',
        time: 'الثلاثاء',
        unread: 0,
        isOnline: false,
        isRead: true,
        hasStory: true,
        link: 'chat.html'
      },
      {
        id: 5,
        name: 'ليلى',
        avatar: 'fa-user-circle',
        avatarColor: '#FCE4EC',
        lastMessage: 'مكالمة فائتة (2)',
        time: 'الثلاثاء',
        unread: 1,
        isOnline: true,
        isRead: false,
        hasStory: false,
        link: 'chat.html'
      }
    ];

    const container = document.getElementById('chatsListContainer');
    const searchInput = document.getElementById('searchInput');

    // ---------- دالة إنشاء عنصر محادثة ----------
    function createChatItem(chat) {
      const item = document.createElement('div');
      item.className = 'chat-item';
      item.setAttribute('data-id', chat.id);
      item.setAttribute('data-name', chat.name);
      
      // صورة الأفتار
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'chat-avatar';
      const ring = document.createElement('div');
      ring.className = 'avatar-ring';
      if (!chat.hasStory) {
        ring.style.background = 'transparent'; // بدون حلقة ملونة للستوري
      }
      const inner = document.createElement('div');
      inner.className = 'avatar-inner';
      inner.style.background = chat.avatarColor;
      const icon = document.createElement('i');
      icon.className = `fas ${chat.avatar}`;
      inner.appendChild(icon);
      ring.appendChild(inner);
      avatarDiv.appendChild(ring);
      
      // مؤشر الحالة (أونلاين/ستوري)
      if (chat.isOnline) {
        const onlineDot = document.createElement('span');
        onlineDot.className = 'story-indicator';
        onlineDot.style.background = '#2ecc71';
        onlineDot.style.bottom = '2px';
        onlineDot.style.left = '2px';
        avatarDiv.appendChild(onlineDot);
      } else if (chat.hasStory) {
        const storyDot = document.createElement('span');
        storyDot.className = 'story-indicator';
        storyDot.style.background = 'linear-gradient(45deg, #f09433, #dc2743)';
        avatarDiv.appendChild(storyDot);
      }

      // محتوى النص
      const contentDiv = document.createElement('div');
      contentDiv.className = 'chat-content';
      
      const headerRow = document.createElement('div');
      headerRow.className = 'chat-header-row';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'chat-name';
      nameSpan.textContent = chat.name;
      const timeSpan = document.createElement('span');
      timeSpan.className = 'chat-time';
      timeSpan.textContent = chat.time;
      headerRow.appendChild(nameSpan);
      headerRow.appendChild(timeSpan);
      
      const lastRow = document.createElement('div');
      lastRow.className = 'chat-last-message';
      const msgSpan = document.createElement('span');
      msgSpan.className = 'last-message-text';
      msgSpan.textContent = chat.lastMessage;
      
      const statusDiv = document.createElement('div');
      statusDiv.className = 'message-status';
      
      // علامات القراءة / عدد غير مقروء
      if (chat.unread > 0) {
        const badge = document.createElement('span');
        badge.className = 'unread-badge';
        badge.textContent = chat.unread;
        statusDiv.appendChild(badge);
      } else if (chat.isRead) {
        const checkIcon = document.createElement('i');
        checkIcon.className = 'fas fa-check-double double-check';
        statusDiv.appendChild(checkIcon);
      }
      
      lastRow.appendChild(msgSpan);
      lastRow.appendChild(statusDiv);
      
      contentDiv.appendChild(headerRow);
      contentDiv.appendChild(lastRow);
      
      item.appendChild(avatarDiv);
      item.appendChild(contentDiv);
      
      // حدث النقر للانتقال إلى صفحة المحادثة
      item.addEventListener('click', (e) => {
        // يمكن فتح chat.html مع تمرير معرف المحادثة (محاكاة)
        window.location.href = chat.link + '?id=' + chat.id;
      });
      
      return item;
    }

    // عرض جميع المحادثات
    function renderChats(chatsArray) {
      container.innerHTML = '';
      if (chatsArray.length === 0) {
        container.innerHTML = '<div class="no-results"><i class="fas fa-search" style="font-size: 32px; opacity:0.5; margin-bottom:12px;"></i><br/>لا توجد محادثات مطابقة</div>';
        return;
      }
      chatsArray.forEach(chat => {
        container.appendChild(createChatItem(chat));
      });
    }

    // فلترة البحث
    function filterChats(searchTerm) {
      const term = searchTerm.trim().toLowerCase();
      if (!term) return chatsData;
      return chatsData.filter(chat => 
        chat.name.toLowerCase().includes(term) || 
        chat.lastMessage.toLowerCase().includes(term)
      );
    }

    // تحديث القائمة بناءً على البحث
    function handleSearch() {
      const filtered = filterChats(searchInput.value);
      renderChats(filtered);
    }

    // ---------- أحداث البحث ----------
    searchInput.addEventListener('input', handleSearch);

    // ---------- التنقل بين الصفحات (محاكاة) ----------
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        const page = this.getAttribute('data-page');
        
        // إزالة النشط من الكل
        navItems.forEach(n => n.classList.remove('active'));
        this.classList.add('active');
        
        // محاكاة التنقل (تنبيه فقط - لاحقًا سنطور صفحات منفصلة)
        if (page === 'contacts') {
          alert('📇 سيتم الانتقال إلى صفحة جهات الاتصال (قيد التطوير)');
          // يمكن إضافة: window.location.href = 'contacts.html';
        } else if (page === 'settings') {
          alert('⚙️ سيتم الانتقال إلى صفحة الإعدادات (قيد التطوير)');
        }
        // بالنسبة لـ chats نحن هنا بالفعل
      });
    });

    // ---------- بدء العرض ----------
    renderChats(chatsData);

    // إضافة تأثير التمرير السلس
    window.addEventListener('resize', () => { /* لا شيء */ });
  })();
</script>
<!-- ملاحظة: الصفحة الرئيسية جاهزة، اضغط على أي محادثة للانتقال إلى chat.html -->
</body>
</html>
