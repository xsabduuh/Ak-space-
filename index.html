<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>دردشة - Chat UI</title>
  <!-- خطوط وأيقونات -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== إعادة تعيين ومتغيرات ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #008080;           /* أزرق مخضر (Teal) */
      --deep-blue: #0A2540;      /* أزرق عميق */
      --off-white: #F7F9FC;      /* أبيض فاتح مع مسحة باردة */
      --bubble-other: #E9F0F5;   /* فاتح لرسائل الطرف الآخر */
      --bubble-user: var(--deep-blue);
      --text-dark: #1E2A3A;
      --text-light: #FFFFFF;
      --time-meta: #6B7A8A;
      --border-light: rgba(0,0,0,0.05);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --radius-bubble: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #D0DDE5;  /* خلفية خارجية ناعمة لإبراز الهاتف */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
      direction: rtl; /* الواجهة بالعربية، لكن الفقاعات تبقى بنفس الترتيب (يمين/يسار) */
    }

    /* ========== حاوية التطبيق (تشبه شاشة الهاتف) ========== */
    .chat-app {
      max-width: 420px;
      width: 100%;
      height: 780px;
      max-height: 95vh;
      background-color: var(--off-white);
      border-radius: 36px;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.02);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
      transition: all 0.2s;
      /* نمط خلفية خفيف (Subtle Texture) لكامل الواجهة، مع تكثيفه لاحقاً في منطقة المحادثة */
      background-image: 
        radial-gradient(circle at 25% 30%, rgba(0,128,128,0.02) 0%, transparent 25%),
        repeating-linear-gradient(45deg, rgba(10,37,64,0.01) 0px, rgba(10,37,64,0.01) 1px, transparent 1px, transparent 8px);
    }

    /* ========== الهيدر ========== */
    .chat-header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--off-white);
      border-bottom: 1px solid var(--border-light);
      backdrop-filter: blur(8px);
      background: rgba(247, 249, 252, 0.86);
    }

    .header-avatar {
      width: 44px;
      height: 44px;
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%; /* شكل عضوي غير متماثل */
      background: linear-gradient(145deg, var(--teal), #1A6B6B);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: var(--shadow-sm);
      border: 2px solid white;
      transition: transform 0.15s;
    }

    .header-avatar i {
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
    }

    .header-avatar.left-avatar {
      background: linear-gradient(135deg, #3A7B8C, var(--teal));
    }

    .header-avatar.right-avatar {
      background: linear-gradient(135deg, var(--deep-blue), #1F4A6B);
    }

    .app-logo {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--deep-blue);
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.4);
      padding: 4px 18px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 2px white, 0 2px 4px rgba(0,0,0,0.02);
    }

    /* ========== منطقة المحادثة (مع نسيج خاص) ========== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      /* نسيج خلفية مميز للمحادثة فقط */
      background-color: #F3F6FA;
      background-image: 
        radial-gradient(circle at 20% 35%, rgba(0,128,128,0.04) 0%, transparent 30%),
        repeating-linear-gradient(30deg, rgba(10,37,64,0.02) 0px, rgba(10,37,64,0.02) 2px, transparent 2px, transparent 10px),
        linear-gradient(145deg, #F0F4F9 0%, #F9FCFE 100%);
      scroll-behavior: smooth;
    }

    /* تخصيص شريط التمرير */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(0,128,128,0.25);
      border-radius: 20px;
    }

    /* ========== فقاعات الرسائل ========== */
    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.sent {
      justify-content: flex-end;
    }

    .message-row.received {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 80%;
      padding: 14px 16px 10px;
      border-radius: var(--radius-bubble);
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
      word-break: break-word;
      line-height: 1.5;
      font-size: 0.95rem;
      transition: all 0.1s ease;
    }

    /* زوايا غير متماثلة (Asymmetrical) */
    .message-bubble.received-bubble {
      background: var(--bubble-other);
      color: var(--text-dark);
      border-top-left-radius: 4px;          /* زاوية حادة خفيفة */
      border-bottom-right-radius: 22px;
      border-bottom-left-radius: 22px;
      border-top-right-radius: 22px;
      margin-left: 4px;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .message-bubble.sent-bubble {
      background: var(--bubble-user);
      color: var(--text-light);
      border-top-right-radius: 4px;          /* زاوية حادة خفيفة */
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      border-top-left-radius: 22px;
      margin-right: 4px;
      box-shadow: 0 6px 12px -4px rgba(10,37,64,0.18);
    }

    /* ميتا الرسالة: التوقيت وعلامات القراءة */
    .message-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.7rem;
      opacity: 0.75;
    }

    .sent-bubble .message-meta {
      color: rgba(255,255,255,0.8);
    }

    .received-bubble .message-meta {
      color: var(--time-meta);
    }

    .message-time {
      letter-spacing: 0.2px;
    }

    .double-check i {
      font-size: 12px;
      margin-left: -2px;
    }

    .double-check .fa-check-double {
      color: #A0D0FF;
    }

    /* أيقونة المرفقات في الإدخال */
    .attach-btn {
      background: transparent;
      border: none;
      color: var(--teal);
      font-size: 24px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      transition: 0.2s;
      cursor: pointer;
    }

    .attach-btn:hover {
      background: rgba(0,128,128,0.06);
      color: var(--deep-blue);
    }

    /* ========== شريط الإدخال ========== */
    .chat-input-area {
      padding: 12px 16px 16px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,128,128,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-input-wrapper {
      flex: 1;
      background: white;
      border-radius: 48px;
      padding: 4px 18px 4px 4px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02), 0 1px 3px rgba(0,0,0,0.02);
      border: 1px solid #E2E9F0;
      display: flex;
      align-items: center;
    }

    .message-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 14px 0 14px 8px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
    }

    .message-input::placeholder {
      color: #8F9EB0;
      font-weight: 400;
      opacity: 0.8;
    }

    .send-btn {
      background: var(--deep-blue);
      border: none;
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%;  /* شكل دائري غير متماثل */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 14px -6px rgba(10,37,64,0.3);
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .send-btn:hover {
      background: var(--teal);
      transform: scale(0.96);
      box-shadow: 0 4px 8px -4px rgba(0,128,128,0.3);
    }

    .send-btn i {
      margin-right: 2px;
    }

    /* حالة فارغة / رسالة ترحيبية */
    .welcome-message {
      text-align: center;
      color: var(--time-meta);
      padding: 20px 10px;
      font-size: 0.9rem;
    }

    /* تحسينات للهاتف */
    @media (max-width: 380px) {
      .chat-app {
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }
      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>
<div class="chat-app">
  <!-- ========== HEADER ========== -->
  <header class="chat-header">
    <!-- صورة بروفايل يسار (الطرف الآخر) -->
    <div class="header-avatar left-avatar">
      <i class="fas fa-user-astronaut"></i>
    </div>
    <!-- شعار التطبيق في المنتصف -->
    <div class="app-logo">دردشة</div>
    <!-- صورة بروفايل يمين (المستخدم الحالي) -->
    <div class="header-avatar right-avatar">
      <i class="fas fa-user-circle"></i>
    </div>
  </header>

  <!-- ========== منطقة عرض الرسائل ========== -->
  <div class="chat-messages" id="chatMessages">
    <!-- رسائل افتراضية أولية لتوضيح التصميم -->
    <!-- سيتم إنشاؤها عبر JavaScript للحفاظ على تناسق الكود، 
         لكن نضيف بعض العناصر الثابتة كبداية احتياطية، ثم نستبدلها عبر JS -->
  </div>

  <!-- ========== شريط الإدخال ========== -->
  <div class="chat-input-area">
    <button class="attach-btn" id="attachButton" aria-label="إضافة مرفقات">
      <i class="fas fa-paperclip"></i>
    </button>
    <div class="message-input-wrapper">
      <input type="text" class="message-input" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off" dir="auto">
    </div>
    <button class="send-btn" id="sendButton" aria-label="إرسال">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- العناصر ----------
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const attachButton = document.getElementById('attachButton');

    // ---------- بيانات افتراضية (لتوضيح الواجهة) ----------
    const initialMessages = [
      { text: 'مرحباً! كيف حالك؟', sent: false, time: '10:15' },
      { text: 'أهلاً، بخير الحمد لله. جاهز للاجتماع القادم؟', sent: true, time: '10:17' },
      { text: 'نعم، سأرسل الملاحظات بعد قليل 👍', sent: false, time: '10:18' },
      { text: 'ممتاز، في انتظارك', sent: true, time: '10:20', read: true }
    ];

    // ---------- دوال مساعدة ----------
    function getCurrentTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'م' : 'ص';
      hours = hours % 12 || 12; // تنسيق 12 ساعة
      minutes = minutes < 10 ? '0' + minutes : minutes;
      return `${hours}:${minutes} ${ampm}`;
    }

    // إنشاء فقاعة رسالة (عنصر DOM)
    function createMessageElement(text, isSent, timeStr = null, isRead = false) {
      const row = document.createElement('div');
      row.className = `message-row ${isSent ? 'sent' : 'received'}`;

      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${isSent ? 'sent-bubble' : 'received-bubble'}`;

      // نص الرسالة
      const textNode = document.createTextNode(text);
      bubble.appendChild(textNode);

      // حاوية ميتا (الوقت وعلامات القراءة)
      const metaDiv = document.createElement('div');
      metaDiv.className = 'message-meta';

      const timeSpan = document.createElement('span');
      timeSpan.className = 'message-time';
      timeSpan.textContent = timeStr || getCurrentTime();
      metaDiv.appendChild(timeSpan);

      // علامة القراءة المزدوجة (للرسائل المرسلة فقط)
      if (isSent) {
        const checkSpan = document.createElement('span');
        checkSpan.className = 'double-check';
        // استخدام أيقونة التحقق المزدوج من Font Awesome
        checkSpan.innerHTML = isRead 
          ? '<i class="fas fa-check-double" style="color: #7FC9FF;"></i>' 
          : '<i class="fas fa-check-double" style="opacity: 0.7;"></i>';
        metaDiv.appendChild(checkSpan);
      }

      bubble.appendChild(metaDiv);
      row.appendChild(bubble);
      return row;
    }

    // إعادة تحميل الرسائل الأولية في الحاوية
    function renderInitialMessages() {
      chatMessages.innerHTML = ''; // تفريغ
      initialMessages.forEach(msg => {
        const el = createMessageElement(msg.text, msg.sent, msg.time, msg.read || false);
        chatMessages.appendChild(el);
      });
      scrollToBottom();
    }

    // التمرير التلقائي للأسفل
    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // إضافة رسالة جديدة إلى الشاشة (من المستخدم الحالي)
    function addNewMessage(text) {
      if (!text.trim()) return; // لا نرسل فارغة

      const timeNow = getCurrentTime();
      // رسالة مرسلة (sent = true)
      const newMsgEl = createMessageElement(text.trim(), true, timeNow, false);
      chatMessages.appendChild(newMsgEl);
      scrollToBottom();

      // محاكاة قراءة بعد لحظة (اختياري - فقط لتوضيح علامة القراءة)
      // نضيف تأثير "تمت القراءة" بعد ثانية ونصف
      setTimeout(() => {
        const lastSentBubble = chatMessages.querySelector('.message-row.sent:last-child .double-check i');
        if (lastSentBubble) {
          lastSentBubble.style.color = '#7FC9FF';
          lastSentBubble.classList.add('fa-check-double'); // تأكيد
        }
      }, 1200);
    }

    // معالج الإرسال
    function handleSend() {
      const text = messageInput.value;
      addNewMessage(text);
      messageInput.value = '';
      messageInput.focus();
    }

    // ---------- الأحداث (Event Listeners) ----------
    sendButton.addEventListener('click', handleSend);

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    // زر المرفقات - تفاعل تجميلي (تنبيه بسيط)
    attachButton.addEventListener('click', () => {
      // محاكاة إضافة مرفقات (للتوضيح فقط)
      alert('✨ سيتم فتح معرض المرفقات قريباً (محاكاة)');
    });

    // إضافة تأثير لمسي للجوال
    if ('ontouchstart' in window) {
      sendButton.addEventListener('touchstart', function(e) {
        this.style.transform = 'scale(0.92)';
      }, { passive: true });
      sendButton.addEventListener('touchend', function() {
        this.style.transform = '';
      });
    }

    // ---------- بدء العرض مع الرسائل الافتراضية ----------
    renderInitialMessages();

    // ضمان التمرير عند تغيير حجم النافذة أو لوحة المفاتيح (للهواتف)
    window.addEventListener('resize', () => {
      // إعادة التمرير للأسفل إذا كان شريط التمرير قريباً من الأسفل
      const isNearBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 50;
      if (isNearBottom) scrollToBottom();
    });

    // إضافة مراقب لتغيرات DOM (لأي إضافات مستقبلية) لكننا نتحكم يدوياً
    // تحديث: عند إرسال رسالة جديدة نضمن التمرير
    // كذلك إظهار رسالة ترحيبية خفيفة إن كانت المحادثة فارغة (لن يحدث مع الرسائل الأولية)

    // تعليق: الكود منظم وموثق لتسهيل الرفع على GitHub.
    // تم استخدام لوحة ألوان Teal و Deep Blue و Off-white
    // الهيدر يحتوي شعار 'دردشة' وصور بروفايل أنيقة في الزوايا.
    // فقاعات غير متماثلة، خلفية بنمط خفيف، وتفاعل كامل.
  })();
</script>
<!-- ملاحظات إضافية: التصميم متجاوب بالكامل ويعمل على الهاتف وسطح المكتب -->
</body>
</html>
