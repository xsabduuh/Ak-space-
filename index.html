<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>دردشة • أنا وحبيبتي</title>
  <!-- خطوط وأيقونات -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #008080;
      --deep-blue: #0A2540;
      --off-white: #F7F9FC;
      --bubble-her: #E9F0F5;   /* حبيبتي */
      --bubble-me: var(--deep-blue);
      --text-dark: #1E2A3A;
      --text-light: #FFFFFF;
      --time-meta: #6B7A8A;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
      --radius-bubble: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #C8D9E6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }

    .chat-app {
      max-width: 420px;
      width: 100%;
      height: 780px;
      max-height: 95vh;
      background-color: var(--off-white);
      border-radius: 36px;
      box-shadow: 0 25px 40px -10px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 25% 30%, rgba(0,128,128,0.02) 0%, transparent 30%),
        repeating-linear-gradient(45deg, rgba(10,37,64,0.01) 0px, rgba(10,37,64,0.01) 1px, transparent 1px, transparent 8px);
    }

    /* ===== الهيدر ===== */
    .chat-header {
      padding: 14px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(247, 249, 252, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,128,128,0.08);
    }

    .profile-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .profile-badge.active {
      transform: scale(1.02);
    }
    .profile-badge .avatar {
      width: 48px;
      height: 48px;
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      background: linear-gradient(145deg, var(--teal), #1A6B6B);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      box-shadow: var(--shadow-sm);
      border: 2px solid white;
    }
    .profile-badge .avatar.her {
      background: linear-gradient(135deg, #B57BA6, #D291BC);
    }
    .profile-badge .avatar.me {
      background: linear-gradient(135deg, var(--deep-blue), #1F4A6B);
    }
    .profile-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--deep-blue);
      background: rgba(255,255,255,0.6);
      padding: 2px 10px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }
    .active-indicator {
      font-size: 10px;
      color: var(--teal);
      margin-top: -2px;
    }

    .app-logo {
      font-size: 24px;
      font-weight: 600;
      color: var(--deep-blue);
      background: rgba(255,255,255,0.5);
      padding: 6px 20px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 3px white;
      letter-spacing: -0.3px;
    }

    /* ===== منطقة المحادثة ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background-color: #F3F6FA;
      background-image: 
        radial-gradient(circle at 20% 40%, rgba(0,128,128,0.05) 0%, transparent 30%),
        repeating-linear-gradient(30deg, rgba(10,37,64,0.02) 0px, rgba(10,37,64,0.02) 2px, transparent 2px, transparent 10px),
        linear-gradient(145deg, #F0F4F9 0%, #F9FCFE 100%);
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(0,128,128,0.3);
      border-radius: 20px;
    }

    /* فقاعات */
    .message-row {
      display: flex;
      width: 100%;
    }
    .message-row.sent {
      justify-content: flex-end;
    }
    .message-row.received {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 80%;
      padding: 14px 16px 10px;
      border-radius: var(--radius-bubble);
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      word-break: break-word;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .received-bubble {
      background: var(--bubble-her);
      color: var(--text-dark);
      border-top-left-radius: 4px;
      border-bottom-right-radius: 22px;
      border-bottom-left-radius: 22px;
      border-top-right-radius: 22px;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .sent-bubble {
      background: var(--bubble-me);
      color: var(--text-light);
      border-top-right-radius: 4px;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      border-top-left-radius: 22px;
      box-shadow: 0 6px 12px -4px rgba(10,37,64,0.18);
    }

    .message-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .sent-bubble .message-meta {
      color: rgba(255,255,255,0.85);
    }
    .received-bubble .message-meta {
      color: var(--time-meta);
    }

    .double-check i {
      font-size: 12px;
    }

    /* ===== شريط الإدخال ===== */
    .chat-input-area {
      padding: 12px 16px 16px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,128,128,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .current-sender-tag {
      background: rgba(0,128,128,0.08);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      color: var(--deep-blue);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      border: 1px dashed var(--teal);
    }
    .current-sender-tag i {
      color: var(--teal);
    }

    .message-input-wrapper {
      flex: 1;
      background: white;
      border-radius: 48px;
      padding: 4px 18px 4px 4px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
      border: 1px solid #E2E9F0;
      display: flex;
      align-items: center;
    }

    .message-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 14px 0 14px 8px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
    }

    .message-input::placeholder {
      color: #8F9EB0;
    }

    .send-btn {
      background: var(--deep-blue);
      border: none;
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 14px -6px rgba(10,37,64,0.3);
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .send-btn:hover {
      background: var(--teal);
      transform: scale(0.96);
    }

    /* تنبيه صغير */
    .hint-note {
      text-align: center;
      font-size: 11px;
      color: var(--time-meta);
      margin-top: 2px;
      padding: 0 12px;
    }

    @media (max-width: 380px) {
      .chat-app { height: 100vh; max-height: 100vh; border-radius: 0; }
      body { padding: 0; }
    }
  </style>
</head>
<body>
<div class="chat-app">
  <!-- ========== HEADER : أنا + حبيبتي ========= -->
  <header class="chat-header">
    <!-- حبيبتي (اليسار) -->
    <div class="profile-badge" id="herProfileBadge">
      <div class="avatar her">
        <i class="fas fa-heart"></i>
      </div>
      <span class="profile-name">حبيبتي</span>
      <span class="active-indicator" id="herIndicator">⚬</span>
    </div>

    <!-- شعار الدردشة -->
    <div class="app-logo">دردشة</div>

    <!-- أنا (اليمين) -->
    <div class="profile-badge active" id="meProfileBadge">
      <div class="avatar me">
        <i class="fas fa-user-astronaut"></i>
      </div>
      <span class="profile-name">أنا</span>
      <span class="active-indicator" id="meIndicator" style="color: var(--deep-blue);">●</span>
    </div>
  </header>

  <!-- منطقة الرسائل -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- شريط الإدخال مع إظهار المرسل الحالي -->
  <div class="chat-input-area">
    <div class="current-sender-tag" id="senderTag">
      <i class="fas fa-user-astronaut"></i>
      <span id="senderName">أنا</span>
    </div>
    <div class="message-input-wrapper">
      <input type="text" class="message-input" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off" dir="auto">
    </div>
    <button class="send-btn" id="sendButton" aria-label="إرسال">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
  <div class="hint-note">
    💬 اضغط على صورة "حبيبتي" أو "أنا" لتغيير المرسل
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- العناصر ----------
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    
    // بروفايلات للتبديل
    const herBadge = document.getElementById('herProfileBadge');
    const meBadge = document.getElementById('meProfileBadge');
    const herIndicator = document.getElementById('herIndicator');
    const meIndicator = document.getElementById('meIndicator');
    const senderNameSpan = document.getElementById('senderName');
    const senderTagIcon = document.querySelector('#senderTag i');

    // حالة المرسل الحالي: true = أنا (اليمين) , false = حبيبتي (اليسار)
    let currentSenderIsMe = true; 

    // ---------- تحديث واجهة المرسل النشط ----------
    function updateActiveSenderUI() {
      if (currentSenderIsMe) {
        meBadge.classList.add('active');
        herBadge.classList.remove('active');
        meIndicator.innerHTML = '●';
        herIndicator.innerHTML = '⚬';
        senderNameSpan.textContent = 'أنا';
        senderTagIcon.className = 'fas fa-user-astronaut';
        messageInput.placeholder = 'اكتب رسالتك... (أنا)';
      } else {
        herBadge.classList.add('active');
        meBadge.classList.remove('active');
        herIndicator.innerHTML = '●';
        meIndicator.innerHTML = '⚬';
        senderNameSpan.textContent = 'حبيبتي';
        senderTagIcon.className = 'fas fa-heart';
        messageInput.placeholder = 'اكتبي رسالتك... (حبيبتي)';
      }
    }

    // تبديل المرسل
    function setSender(isMe) {
      if (currentSenderIsMe !== isMe) {
        currentSenderIsMe = isMe;
        updateActiveSenderUI();
        messageInput.focus();
      }
    }

    // أحداث الضغط على البروفايل
    herBadge.addEventListener('click', () => setSender(false));
    meBadge.addEventListener('click', () => setSender(true));

    // ---------- بيانات المحادثة الأولية (بين أنا وحبيبتي) ----------
    const initialMessages = [
      { text: 'حبيبي، وحشتني أوي ❤️', sent: false, time: '09:30 م', read: true },
      { text: 'وأنا كمان وحشتيني، عاملة إيه النهاردة؟', sent: true, time: '09:32 م', read: true },
      { text: 'كنت بفكر فيك وأنا بعمل قهوة ☕️', sent: false, time: '09:33 م', read: true },
      { text: 'نفسي أشربها معاكي دلوقتي 😍', sent: true, time: '09:35 م', read: true },
      { text: 'يلا نتفق على مكالمة بليل؟', sent: false, time: '09:37 م', read: false }
    ];

    // ---------- دوال الوقت ----------
    function getCurrentTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'م' : 'ص';
      hours = hours % 12 || 12;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      return `${hours}:${minutes} ${ampm}`;
    }

    // إنشاء عنصر رسالة
    function createMessageElement(text, isSentByMe, timeStr = null, isRead = false) {
      const row = document.createElement('div');
      row.className = `message-row ${isSentByMe ? 'sent' : 'received'}`;

      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${isSentByMe ? 'sent-bubble' : 'received-bubble'}`;

      const textNode = document.createTextNode(text);
      bubble.appendChild(textNode);

      const metaDiv = document.createElement('div');
      metaDiv.className = 'message-meta';

      const timeSpan = document.createElement('span');
      timeSpan.className = 'message-time';
      timeSpan.textContent = timeStr || getCurrentTime();
      metaDiv.appendChild(timeSpan);

      if (isSentByMe) {
        const checkSpan = document.createElement('span');
        checkSpan.className = 'double-check';
        checkSpan.innerHTML = isRead 
          ? '<i class="fas fa-check-double" style="color: #7FC9FF;"></i>' 
          : '<i class="fas fa-check-double" style="opacity: 0.7;"></i>';
        metaDiv.appendChild(checkSpan);
      }

      bubble.appendChild(metaDiv);
      row.appendChild(bubble);
      return row;
    }

    // تحميل الرسائل الأولية
    function renderInitialMessages() {
      chatMessages.innerHTML = '';
      initialMessages.forEach(msg => {
        // msg.sent === true يعني مرسلة من "أنا" (يمين)
        const el = createMessageElement(msg.text, msg.sent, msg.time, msg.read);
        chatMessages.appendChild(el);
      });
      scrollToBottom();
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // إضافة رسالة جديدة (بناءً على currentSenderIsMe)
    function addNewMessage(text) {
      if (!text.trim()) return;

      const timeNow = getCurrentTime();
      const isMe = currentSenderIsMe;
      
      const newMsgEl = createMessageElement(text.trim(), isMe, timeNow, false);
      chatMessages.appendChild(newMsgEl);
      scrollToBottom();

      // محاكاة علامة "مقروءة" بعد فترة
      setTimeout(() => {
        const lastSent = chatMessages.querySelector('.message-row.sent:last-child .double-check i');
        if (lastSent) {
          lastSent.style.color = '#7FC9FF';
        }
      }, 1200);
    }

    // إرسال
    function handleSend() {
      addNewMessage(messageInput.value);
      messageInput.value = '';
      messageInput.focus();
    }

    // ---------- ربط الأحداث ----------
    sendButton.addEventListener('click', handleSend);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    // تحسين تجربة اللمس
    if ('ontouchstart' in window) {
      sendButton.addEventListener('touchstart', function(e) { this.style.transform = 'scale(0.92)'; }, { passive: true });
      sendButton.addEventListener('touchend', function() { this.style.transform = ''; });
    }

    // بدء الواجهة
    updateActiveSenderUI();
    renderInitialMessages();

    // ضبط التمرير عند تغيير حجم الشاشة
    window.addEventListener('resize', () => {
      const nearBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 60;
      if (nearBottom) scrollToBottom();
    });

    // إضافة تعليق توضيحي للكود (لـ GitHub)
    console.log('💖 تطبيق دردشة خاص: أنا وحبيبتي. استمتعوا!');
  })();
</script>
</body>
</html>
