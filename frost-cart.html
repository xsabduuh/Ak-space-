<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة التسوق - فروست</title>
  
  <!-- خطوط وأيقونات متوافقة مع الأصل -->
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    /* ===== متغيرات فروست الأصلية ===== */
    :root {
      --bg-dark: #0b0f17;
      --bg-card: #11161f;
      --surface: #1a202c;
      --surface-hover: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #f9734e;
      --accent-light: #ffb347;
      --accent-glow: rgba(249, 115, 78, 0.6);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gradient-1: linear-gradient(135deg, #f9734e, #ffb347);
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.6);
      --shadow-glow: 0 0 30px rgba(249,115,78,0.4);
      --radius-sm: 0.75rem;
      --radius-md: 1rem;
      --radius-lg: 1.5rem;
      --radius-xl: 2rem;
      --radius-full: 9999px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', 'Almarai', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* تحسين الأداء للعناصر الثابتة */
    .cart-overlay, .cart-modal, .cart-float-btn {
      will-change: transform;
      transform: translateZ(0);
    }

    /* ===== زر السلة العائم (FAB) ===== */
    .cart-float-btn {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      width: 65px;
      height: 65px;
      background: var(--gradient-1);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(249, 115, 78, 0.5);
      z-index: 1000;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-float-btn:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 12px 35px rgba(249, 115, 78, 0.7);
    }

    .cart-float-btn .count {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--danger);
      color: white;
      font-size: 14px;
      font-weight: 800;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--bg-dark);
      animation: bounce 0.5s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ===== مودال السلة ===== */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition-base);
    }

    .cart-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .cart-modal {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: var(--bg-card);
      z-index: 2001;
      transform: translateX(100%);
      transition: transform var(--transition-slow);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-overlay.active ~ .cart-modal {
      transform: translateX(0);
    }

    /* رأس السلة */
    .cart-header {
      padding: 1.75rem 1.5rem;
      background: var(--gradient-1);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-title {
      font-family: 'Almarai', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      width: 45px;
      height: 45px;
      border-radius: var(--radius-md);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: rotate(90deg);
    }

    /* جسم السلة */
    .cart-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      background: var(--bg-dark);
    }

    .cart-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .cart-empty i {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      opacity: 0.3;
      color: var(--accent);
    }

    .cart-empty h3 {
      font-family: 'Almarai', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    /* عناصر السلة */
    .cart-item {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all var(--transition-base);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .cart-item:hover {
      border-color: rgba(249, 115, 78, 0.3);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .item-image {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-md);
      object-fit: cover;
      background: var(--bg-card);
    }

    .item-details {
      flex: 1;
    }

    .item-name {
      font-family: 'Almarai', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
    }

    .item-price {
      color: var(--accent);
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 0.75rem;
    }

    .item-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      font-weight: 700;
      color: var(--text-primary);
    }

    .qty-btn:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .item-qty {
      font-weight: 700;
      min-width: 30px;
      text-align: center;
      font-size: 1rem;
    }

    .remove-btn {
      margin-right: auto;
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .remove-btn:hover {
      background: var(--danger);
      color: white;
      transform: scale(1.1);
    }

    /* تذييل السلة والملخص */
    .cart-footer {
      padding: 1.5rem;
      background: var(--surface);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .summary-row.total {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-primary);
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .checkout-btn {
      width: 100%;
      padding: 1.1rem;
      background: var(--gradient-1);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      font-family: 'Almarai', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: 0 4px 15px rgba(249, 115, 78, 0.4);
    }

    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(249, 115, 78, 0.6);
    }

    .checkout-btn i {
      font-size: 1.5rem;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      color: var(--text-primary);
      padding: 1rem 2rem;
      border-radius: var(--radius-full);
      font-weight: 500;
      z-index: 3000;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: var(--shadow-xl);
      border-right: 4px solid var(--accent);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-right-color: var(--success); }
    .toast.error { border-right-color: var(--danger); }
    .toast.warning { border-right-color: var(--warning); }

    /* ===== للتجربة (اختياري) ===== */
    .demo-section {
      max-width: 800px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .demo-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-full);
      font-family: 'Almarai', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-base);
      margin: 0.5rem;
    }

    .demo-btn:hover {
      background: #e5633e;
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(249,115,78,0.4);
    }

    /* تجاوب الجوال */
    @media (max-width: 640px) {
      .cart-modal {
        max-width: 100%;
      }
      .cart-item {
        flex-direction: column;
      }
      .item-image {
        width: 100%;
        height: 140px;
      }
      .item-controls {
        justify-content: space-between;
      }
      .remove-btn {
        margin-right: 0;
      }
    }
  </style>
</head>
<body>

  <!-- ===== قسم تجريبي (يمكنك حذفه عند الدمج) ===== -->
  <div class="demo-section">
    <h2 style="font-family: 'Almarai'; margin-bottom: 1rem; color: var(--accent);">🍨 اختبار السلة</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">أضف بعض النكهات الفاخرة إلى السلة</p>
    <button class="demo-btn" onclick="addToCart(1, 'كراميل مملح', 24, 'https://images.unsplash.com/photo-1560008581-09826d1de69e?w=200')">
      <i class="fas fa-plus"></i> كراميل مملح (24 ر.س)
    </button>
    <button class="demo-btn" onclick="addToCart(2, 'فستق سوري', 32, 'https://images.unsplash.com/photo-1579954115545-a95591f28bfc?w=200')">
      <i class="fas fa-plus"></i> فستق سوري (32 ر.س)
    </button>
    <button class="demo-btn" onclick="addToCart(3, 'مانجو ألبنسي', 20, 'https://images.unsplash.com/photo-1516559828984-fb3b99548b21?w=200')">
      <i class="fas fa-plus"></i> مانجو ألبنسي (20 ر.س)
    </button>
  </div>

  <!-- ===== زر السلة العائم ===== -->
  <button class="cart-float-btn" onclick="openCart()" aria-label="فتح سلة التسوق">
    <i class="fas fa-shopping-bag"></i>
    <span class="count" id="cartCount" style="display: none;">0</span>
  </button>

  <!-- ===== طبقة التغطية ===== -->
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <!-- ===== نافذة السلة ===== -->
  <div class="cart-modal" id="cartModal">
    <div class="cart-header">
      <div class="cart-title">
        <i class="fas fa-shopping-bag"></i>
        <span>سلة التسوق</span>
      </div>
      <button class="close-btn" onclick="closeCart()" aria-label="إغلاق">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="cart-body" id="cartBody">
      <!-- تمتلئ ديناميكياً -->
    </div>

    <div class="cart-footer" id="cartFooter" style="display: none;">
      <div class="summary-row">
        <span>المجموع الفرعي:</span>
        <span id="subtotal">0 ر.س</span>
      </div>
      <div class="summary-row">
        <span>الضريبة (15%):</span>
        <span id="tax">0 ر.س</span>
      </div>
      <div class="summary-row total">
        <span>الإجمالي:</span>
        <span id="total">0 ر.س</span>
      </div>
      
      <button class="checkout-btn" onclick="checkout()">
        <i class="fab fa-whatsapp"></i>
        إتمام الطلب عبر واتساب
      </button>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== منطق السلة (متوافق مع بيانات فروست) =====
    let cart = JSON.parse(localStorage.getItem('frost_cart_standalone')) || [];

    // فتح وإغلاق السلة
    function openCart() {
      document.getElementById('cartOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      renderCart();
    }

    function closeCart() {
      document.getElementById('cartOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    // إضافة منتج (id, name, price, image)
    function addToCart(id, name, price, image) {
      const existingItem = cart.find(item => item.id === id);
      
      if (existingItem) {
        existingItem.quantity += 1;
        showToast(`تم زيادة كمية ${name} ✨`, 'success');
      } else {
        cart.push({
          id: id,
          name: name,
          price: price,
          image: image || 'https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=200',
          quantity: 1
        });
        showToast(`تم إضافة ${name} إلى السلة 🍨`, 'success');
      }
      
      saveCart();
      updateCartCount();
      
      // تأثير بصري على الزر
      const btn = document.querySelector('.cart-float-btn');
      btn.style.transform = 'scale(1.2)';
      setTimeout(() => btn.style.transform = '', 200);
    }

    function removeFromCart(id) {
      const item = cart.find(item => item.id === id);
      cart = cart.filter(item => item.id !== id);
      saveCart();
      updateCartCount();
      renderCart();
      showToast(`تم حذف ${item.name} من السلة`, 'warning');
    }

    function updateQuantity(id, change) {
      const item = cart.find(item => item.id === id);
      if (!item) return;
      
      item.quantity += change;
      
      if (item.quantity <= 0) {
        removeFromCart(id);
      } else {
        saveCart();
        renderCart();
        updateCartCount();
      }
    }

    function saveCart() {
      localStorage.setItem('frost_cart_standalone', JSON.stringify(cart));
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      const countElement = document.getElementById('cartCount');
      
      if (count > 0) {
        countElement.textContent = count;
        countElement.style.display = 'flex';
        countElement.style.animation = 'none';
        setTimeout(() => countElement.style.animation = 'bounce 0.5s ease', 10);
      } else {
        countElement.style.display = 'none';
      }
    }

    function renderCart() {
      const cartBody = document.getElementById('cartBody');
      const cartFooter = document.getElementById('cartFooter');
      
      if (cart.length === 0) {
        cartBody.innerHTML = `
          <div class="cart-empty">
            <i class="fas fa-ice-cream"></i>
            <h3>سلة التسوق فارغة</h3>
            <p>أضف بعض النكهات اللذيذة لتبدأ!</p>
          </div>
        `;
        cartFooter.style.display = 'none';
        return;
      }

      cartBody.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="item-image" onerror="this.src='https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=200'">
          <div class="item-details">
            <div class="item-name">${item.name}</div>
            <div class="item-price">${item.price} ر.س</div>
            <div class="item-controls">
              <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
              <span class="item-qty">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
              <button class="remove-btn" onclick="removeFromCart(${item.id})" title="حذف">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      // حساب المجاميع
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const tax = subtotal * 0.15;
      const total = subtotal + tax;

      document.getElementById('subtotal').textContent = `${subtotal.toFixed(2)} ر.س`;
      document.getElementById('tax').textContent = `${tax.toFixed(2)} ر.س`;
      document.getElementById('total').textContent = `${total.toFixed(2)} ر.س`;
      
      cartFooter.style.display = 'block';
    }

    function checkout() {
      if (cart.length === 0) {
        showToast('السلة فارغة!', 'error');
        return;
      }

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const tax = subtotal * 0.15;
      const total = subtotal + tax;

      let message = '🍨 *طلب جديد من فروست*%0A%0A';
      message += '▬▬▬▬▬▬▬▬▬▬▬▬%0A';
      
      cart.forEach(item => {
        message += `• ${item.name} (${item.quantity}x) - ${item.price * item.quantity} ر.س%0A`;
      });
      
      message += '%0A▬▬▬▬▬▬▬▬▬▬▬▬%0A';
      message += `💰 المجموع الفرعي: ${subtotal.toFixed(2)} ر.س%0A`;
      message += `📊 الضريبة (15%): ${tax.toFixed(2)} ر.س%0A`;
      message += `✅ *الإجمالي: ${total.toFixed(2)} ر.س*%0A%0A`;
      message += 'الرجاء تأكيد الطلب 🚚';

      // استبدل برقم واتساب الفعلي
      const phoneNumber = '966500000000';
      window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
      
      showToast('جاري تحويلك إلى واتساب...', 'success');
    }

    function showToast(message, type = 'default') {
      const toast = document.getElementById('toast');
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-times-circle',
        warning: 'fa-exclamation-circle',
        default: 'fa-info-circle'
      };
      
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fas ${icons[type] || icons.default}"></i>
        <span>${message}</span>
      `;
      
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // اختصارات لوحة المفاتيح
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCart();
    });

    // تهيئة العداد عند التحميل
    updateCartCount();
  </script>
</body>
</html>
