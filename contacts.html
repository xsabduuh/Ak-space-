<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>دردشة • جهات الاتصال</title>
  <!-- خطوط وأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== الأساسيات والمتغيرات ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #008080;
      --deep-blue: #0A2540;
      --off-white: #F7F9FC;
      --accent-pink: #E1306C;
      --text-dark: #1E2A3A;
      --text-secondary: #6B7A8A;
      --border-light: rgba(0,0,0,0.05);
      --shadow-card: 0 8px 20px rgba(0,0,0,0.03);
      --online: #2ecc71;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #D6E3ED;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }

    /* حاوية التطبيق (شاشة الهاتف) */
    .app-container {
      max-width: 400px;
      width: 100%;
      height: 780px;
      max-height: 95vh;
      background: var(--off-white);
      border-radius: 36px;
      box-shadow: 0 30px 50px -15px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0,128,128,0.02) 0%, transparent 30%),
        repeating-linear-gradient(45deg, rgba(10,37,64,0.01) 0px, rgba(10,37,64,0.01) 1px, transparent 1px, transparent 10px);
    }

    /* ========== الهيدر ========== */
    .main-header {
      padding: 20px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .main-header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--teal), var(--deep-blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .header-icons {
      display: flex;
      gap: 18px;
    }

    .header-icons i {
      font-size: 22px;
      color: var(--deep-blue);
      opacity: 0.8;
      cursor: pointer;
      transition: 0.15s;
    }

    .header-icons i:hover {
      color: var(--teal);
      opacity: 1;
    }

    /* ========== شريط البحث ========== */
    .search-section {
      padding: 8px 16px 16px;
    }

    .search-container {
      background: white;
      border-radius: 30px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,128,128,0.1);
      backdrop-filter: blur(4px);
    }

    .search-container i {
      color: var(--teal);
      font-size: 18px;
    }

    .search-container input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      padding: 6px 0;
    }

    .search-container input::placeholder {
      color: #A0B0C0;
      font-weight: 400;
    }

    /* ========== قائمة جهات الاتصال ========== */
    .contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 10px;
    }

    /* حرف القسم (أ، ب، ت...) */
    .section-letter {
      padding: 12px 16px 4px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(0,128,128,0.15);
      margin-bottom: 6px;
    }

    /* بطاقة جهة اتصال */
    .contact-item {
      display: flex;
      align-items: center;
      padding: 12px 12px;
      margin-bottom: 4px;
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow-card);
      transition: 0.2s;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .contact-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 18px -8px rgba(0,128,128,0.08);
    }

    /* صورة الأفتار */
    .contact-avatar {
      position: relative;
      margin-left: 14px;
    }

    .avatar-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--deep-blue);
      border: 2px solid white;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--online);
      border: 3px solid white;
      border-radius: 50%;
    }

    /* معلومات جهة الاتصال */
    .contact-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .contact-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--deep-blue);
    }

    .contact-status {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .contact-status i {
      font-size: 10px;
      color: var(--online);
    }

    /* أزرار الإجراءات السريعة */
    .contact-actions {
      display: flex;
      gap: 16px;
    }

    .contact-actions i {
      font-size: 20px;
      color: var(--deep-blue);
      opacity: 0.7;
      transition: 0.15s;
      cursor: pointer;
    }

    .contact-actions i:hover {
      color: var(--teal);
      opacity: 1;
    }

    /* زر إضافة جهة اتصال (FAB) */
    .fab-add {
      position: sticky;
      bottom: 20px;
      align-self: flex-end;
      margin-left: 16px;
      background: var(--teal);
      color: white;
      width: 56px;
      height: 56px;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 10px 20px -5px rgba(0,128,128,0.4);
      cursor: pointer;
      transition: 0.2s;
      border: none;
    }

    .fab-add:hover {
      background: var(--deep-blue);
      transform: scale(0.95);
    }

    /* ========== شريط التنقل السفلي ========== */
    .bottom-nav {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      padding: 10px 20px 16px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(0,128,128,0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-secondary);
      transition: 0.15s;
      font-size: 12px;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: none;
    }

    .nav-item i {
      font-size: 24px;
    }

    .nav-item.active {
      color: var(--teal);
      font-weight: 600;
    }

    .nav-item span {
      font-size: 11px;
    }

    /* حالة عدم وجود نتائج */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    @media (max-width: 380px) {
      .app-container {
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }
      body { padding: 0; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- ========== الهيدر ========== -->
  <header class="main-header">
    <h1>جهات الاتصال</h1>
    <div class="header-icons">
      <i class="fas fa-user-plus" title="إضافة جهة اتصال"></i>
      <i class="fas fa-ellipsis-h" title="المزيد"></i>
    </div>
  </header>

  <!-- ========== شريط البحث ========== -->
  <div class="search-section">
    <div class="search-container">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="ابحث عن جهة اتصال..." autocomplete="off">
    </div>
  </div>

  <!-- ========== قائمة جهات الاتصال ========== -->
  <div class="contacts-list" id="contactsListContainer">
    <!-- المحتوى يتم إنشاؤه ديناميكيًا -->
  </div>

  <!-- زر الإضافة العائم -->
  <button class="fab-add" id="fabAddButton" aria-label="إضافة جهة اتصال">
    <i class="fas fa-plus"></i>
  </button>

  <!-- ========== شريط التنقل السفلي ========== -->
  <nav class="bottom-nav">
    <a class="nav-item" data-page="chats">
      <i class="fas fa-comment-dots"></i>
      <span>المحادثات</span>
    </a>
    <a class="nav-item active" data-page="contacts">
      <i class="fas fa-address-book"></i>
      <span>جهات الاتصال</span>
    </a>
    <a class="nav-item" data-page="settings">
      <i class="fas fa-cog"></i>
      <span>الإعدادات</span>
    </a>
  </nav>
</div>

<script>
  (function(){
    "use strict";

    // ---------- بيانات جهات الاتصال التجريبية ----------
    const contactsData = [
      { name: 'أحمد علي', avatar: 'fa-user-tie', color: '#E3F2FD', status: 'متصل', online: true, section: 'أ' },
      { name: 'إيمان محمد', avatar: 'fa-user-circle', color: '#FCE4EC', status: 'آخر ظهور أمس', online: false, section: 'إ' },
      { name: 'باسل الخطيب', avatar: 'fa-user-graduate', color: '#FFF3E0', status: 'متصل', online: true, section: 'ب' },
      { name: 'تالا العمري', avatar: 'fa-user-astronaut', color: '#E8F5E9', status: 'آخر ظهور 10:30 ص', online: false, section: 'ت' },
      { name: 'حبيبتي ❤️', avatar: 'fa-heart', color: '#FFE4E9', status: 'متصل', online: true, section: 'ح' },
      { name: 'خالد السيد', avatar: 'fa-user-ninja', color: '#E0F2FE', status: 'متصل', online: true, section: 'خ' },
      { name: 'رنا سمير', avatar: 'fa-user-circle', color: '#F3E5F5', status: 'آخر ظهور الأربعاء', online: false, section: 'ر' },
      { name: 'سارة أحمد', avatar: 'fa-user-tie', color: '#E8EAF6', status: 'متصل', online: true, section: 'س' },
      { name: 'عمر فاروق', avatar: 'fa-user-secret', color: '#EFEBE9', status: 'آخر ظهور أمس', online: false, section: 'ع' },
      { name: 'ليلى حسن', avatar: 'fa-user-circle', color: '#FCE4EC', status: 'متصل', online: true, section: 'ل' },
      { name: 'محمد نور', avatar: 'fa-user-astronaut', color: '#E0F2FE', status: 'متصل', online: true, section: 'م' },
      { name: 'نورا فؤاد', avatar: 'fa-user-circle', color: '#FFF3E0', status: 'آخر ظهور 9:15 ص', online: false, section: 'ن' },
      { name: 'هالة يوسف', avatar: 'fa-user-tie', color: '#F3E5F5', status: 'متصل', online: true, section: 'هـ' },
      { name: 'ياسمين علي', avatar: 'fa-user-astronaut', color: '#FFE4E9', status: 'آخر ظهور الثلاثاء', online: false, section: 'ي' }
    ];

    const container = document.getElementById('contactsListContainer');
    const searchInput = document.getElementById('searchInput');
    const fabAdd = document.getElementById('fabAddButton');

    // ---------- تجميع جهات الاتصال حسب الحرف الأول ----------
    function groupContactsBySection(contacts) {
      const groups = {};
      contacts.forEach(contact => {
        const firstLetter = contact.name.charAt(0); // الحرف الأول
        if (!groups[firstLetter]) groups[firstLetter] = [];
        groups[firstLetter].push(contact);
      });
      // ترتيب الحروف أبجدياً
      const sortedGroups = {};
      Object.keys(groups).sort((a, b) => a.localeCompare(b, 'ar')).forEach(key => {
        sortedGroups[key] = groups[key];
      });
      return sortedGroups;
    }

    // ---------- إنشاء عنصر جهة اتصال ----------
    function createContactElement(contact) {
      const item = document.createElement('div');
      item.className = 'contact-item';
      
      // الأفتار
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'contact-avatar';
      const ring = document.createElement('div');
      ring.className = 'avatar-ring';
      const inner = document.createElement('div');
      inner.className = 'avatar-inner';
      inner.style.background = contact.color;
      const icon = document.createElement('i');
      icon.className = `fas ${contact.avatar}`;
      inner.appendChild(icon);
      ring.appendChild(inner);
      avatarDiv.appendChild(ring);
      
      if (contact.online) {
        const dot = document.createElement('span');
        dot.className = 'online-dot';
        avatarDiv.appendChild(dot);
      }
      
      // المعلومات
      const infoDiv = document.createElement('div');
      infoDiv.className = 'contact-info';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'contact-name';
      nameSpan.textContent = contact.name;
      
      const statusSpan = document.createElement('span');
      statusSpan.className = 'contact-status';
      if (contact.online) {
        statusSpan.innerHTML = '<i class="fas fa-circle"></i> متصل';
      } else {
        statusSpan.textContent = contact.status;
      }
      
      infoDiv.appendChild(nameSpan);
      infoDiv.appendChild(statusSpan);
      
      // أزرار الإجراءات
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'contact-actions';
      actionsDiv.innerHTML = `
        <i class="fas fa-phone-alt" title="اتصال"></i>
        <i class="fas fa-comment-dots" title="مراسلة"></i>
      `;
      
      item.appendChild(avatarDiv);
      item.appendChild(infoDiv);
      item.appendChild(actionsDiv);
      
      // أحداث النقر على الأزرار
      const msgIcon = actionsDiv.querySelector('.fa-comment-dots');
      msgIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        alert(`💬 فتح المحادثة مع ${contact.name}`);
        // يمكن توجيه إلى chat.html
      });
      
      const callIcon = actionsDiv.querySelector('.fa-phone-alt');
      callIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        alert(`📞 اتصال بـ ${contact.name}`);
      });
      
      // النقر على العنصر بالكامل يفتح المحادثة
      item.addEventListener('click', () => {
        alert(`💬 فتح المحادثة مع ${contact.name}`);
        // window.location.href = 'chat.html?name=' + encodeURIComponent(contact.name);
      });
      
      return item;
    }

    // ---------- عرض القائمة مع التقسيم حسب الحروف ----------
    function renderContacts(contactsArray) {
      container.innerHTML = '';
      if (contactsArray.length === 0) {
        container.innerHTML = '<div class="no-results"><i class="fas fa-user-slash" style="font-size: 40px; opacity:0.5; margin-bottom:12px;"></i><br/>لا توجد جهات اتصال</div>';
        return;
      }
      
      const grouped = groupContactsBySection(contactsArray);
      
      for (const letter in grouped) {
        // إضافة عنوان القسم
        const sectionHeader = document.createElement('div');
        sectionHeader.className = 'section-letter';
        sectionHeader.textContent = letter;
        container.appendChild(sectionHeader);
        
        // إضافة جهات الاتصال
        grouped[letter].forEach(contact => {
          container.appendChild(createContactElement(contact));
        });
      }
    }

    // ---------- فلترة البحث ----------
    function filterContacts(searchTerm) {
      const term = searchTerm.trim().toLowerCase();
      if (!term) return contactsData;
      return contactsData.filter(c => 
        c.name.toLowerCase().includes(term) ||
        c.status.toLowerCase().includes(term)
      );
    }

    function handleSearch() {
      const filtered = filterContacts(searchInput.value);
      renderContacts(filtered);
    }

    // ---------- أحداث ----------
    searchInput.addEventListener('input', handleSearch);
    
    fabAdd.addEventListener('click', () => {
      alert('➕ إضافة جهة اتصال جديدة (محاكاة)');
    });

    // التنقل بين الصفحات
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        const page = this.getAttribute('data-page');
        
        navItems.forEach(n => n.classList.remove('active'));
        this.classList.add('active');
        
        if (page === 'chats') {
          alert('💬 الانتقال إلى المحادثات');
          // window.location.href = 'index.html';
        } else if (page === 'settings') {
          alert('⚙️ الانتقال إلى الإعدادات');
          // window.location.href = 'settings.html';
        }
      });
    });

    // بدء العرض
    renderContacts(contactsData);
  })();
</script>
</body>
</html>
