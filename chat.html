<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>دردشة • المحادثة</title>
  <!-- خطوط وأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== إعادة تعيين ومتغيرات ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #008080;
      --deep-blue: #0A2540;
      --off-white: #F7F9FC;
      --bubble-her: #FFE4E9;      /* حبيبتي - وردي ناعم */
      --bubble-me: #0A2540;        /* أنا - أزرق غامق */
      --text-dark: #1E2A3A;
      --text-light: #FFFFFF;
      --time-meta: #6B7A8A;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #D6E3ED;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }

    /* حاوية التطبيق (تشبه الهاتف) */
    .chat-screen {
      max-width: 400px;
      width: 100%;
      height: 780px;
      max-height: 95vh;
      background: var(--off-white);
      border-radius: 36px;
      box-shadow: 0 30px 50px -15px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* نسيج خلفية خفيف */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0,128,128,0.02) 0%, transparent 30%),
        repeating-linear-gradient(45deg, rgba(10,37,64,0.01) 0px, rgba(10,37,64,0.01) 1px, transparent 1px, transparent 10px);
    }

    /* ========== الهيدر (مع زر العودة) ========== */
    .chat-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,128,128,0.1);
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 26px;
      color: var(--deep-blue);
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: rgba(0,128,128,0.1);
    }

    .header-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* صورة الطرف الآخر (حبيبتي) */
    .other-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .other-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #FFE4E9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #C2185B;
      border: 2px solid white;
    }

    .header-text h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--deep-blue);
    }

    .header-text p {
      font-size: 0.75rem;
      color: var(--teal);
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-actions i {
      font-size: 22px;
      color: var(--deep-blue);
      opacity: 0.8;
      cursor: pointer;
    }

    /* ========== منطقة المحادثة ========== */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: #F5F9FE;
      /* نمط خلفية يشبه واتساب */
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0,128,128,0.04) 0%, transparent 30%),
        repeating-linear-gradient(0deg, rgba(10,37,64,0.02) 0px, rgba(10,37,64,0.02) 1px, transparent 1px, transparent 10px),
        repeating-linear-gradient(90deg, rgba(10,37,64,0.01) 0px, rgba(10,37,64,0.01) 1px, transparent 1px, transparent 15px);
      scroll-behavior: smooth;
    }

    .messages-container::-webkit-scrollbar {
      width: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: var(--teal);
      border-radius: 20px;
    }

    /* ========== فقاعات الرسائل ========== */
    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.sent {
      justify-content: flex-end;
    }

    .message-row.received {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px 8px;
      border-radius: 22px;
      position: relative;
      word-break: break-word;
      line-height: 1.5;
      font-size: 0.95rem;
      box-shadow: 0 4px 8px -4px rgba(0,0,0,0.05);
    }

    .received-bubble {
      background: var(--bubble-her);
      color: var(--text-dark);
      border-top-left-radius: 6px;
      border-bottom-right-radius: 24px;
      border-bottom-left-radius: 24px;
      border-top-right-radius: 24px;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .sent-bubble {
      background: var(--bubble-me);
      color: var(--text-light);
      border-top-right-radius: 6px;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      border-top-left-radius: 24px;
      box-shadow: 0 8px 16px -6px rgba(10,37,64,0.3);
    }

    .message-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 6px;
      font-size: 0.65rem;
      opacity: 0.85;
    }

    .sent-bubble .message-meta {
      color: rgba(255,255,255,0.9);
    }

    .received-bubble .message-meta {
      color: var(--time-meta);
    }

    .double-check i {
      font-size: 12px;
      margin-left: -2px;
    }

    /* ========== شريط الإدخال ========== */
    .input-area {
      padding: 12px 14px 16px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(15px);
      border-top: 1px solid rgba(0,128,128,0.15);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .attach-btn {
      background: transparent;
      border: none;
      color: var(--teal);
      font-size: 26px;
      width: 44px;
      height: 44px;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .input-wrapper {
      flex: 1;
      background: white;
      border-radius: 48px;
      padding: 4px 16px 4px 4px;
      border: 1px solid #E2E9F0;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
      display: flex;
      align-items: center;
    }

    .message-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 12px 0 12px 8px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
    }

    .message-input::placeholder {
      color: #8F9EB0;
    }

    /* تبديل المرسل */
    .sender-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 4px;
    }

    .switch-btn {
      background: rgba(0,128,128,0.08);
      border: 1px dashed var(--teal);
      border-radius: 40px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--deep-blue);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .switch-btn i {
      color: var(--teal);
    }

    .send-btn {
      background: var(--teal);
      border: none;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 16px -6px rgba(0,128,128,0.4);
      transition: 0.2s;
    }

    .send-btn:hover {
      background: var(--deep-blue);
      transform: scale(0.94);
    }

    /* للهاتف */
    @media (max-width: 380px) {
      .chat-screen {
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }
      body { padding: 0; }
    }
  </style>
</head>
<body>
<div class="chat-screen">
  <!-- ========== الهيدر ========== -->
  <header class="chat-header">
    <button class="back-btn" id="backButton" aria-label="رجوع">
      <i class="fas fa-chevron-right"></i>
    </button>
    <div class="header-info">
      <div class="other-avatar">
        <div class="other-avatar-inner">
          <i class="fas fa-heart"></i>
        </div>
      </div>
      <div class="header-text">
        <h2>حبيبتي ❤️</h2>
        <p>متصل الآن</p>
      </div>
    </div>
    <div class="header-actions">
      <i class="fas fa-phone-alt"></i>
      <i class="fas fa-video"></i>
    </div>
  </header>

  <!-- ========== منطقة عرض الرسائل ========== -->
  <div class="messages-container" id="messagesContainer">
    <!-- الرسائل ستضاف هنا ديناميكيًا -->
  </div>

  <!-- ========== شريط الإدخال ========== -->
  <div class="input-area">
    <button class="attach-btn" id="attachButton" aria-label="إضافة مرفقات">
      <i class="fas fa-plus-circle"></i>
    </button>
    <div class="input-wrapper">
      <input type="text" class="message-input" id="messageInput" placeholder="رسالة..." autocomplete="off" dir="auto">
    </div>
    <div class="sender-switch">
      <div class="switch-btn" id="switchSenderBtn">
        <i class="fas fa-user-astronaut" id="switchIcon"></i>
        <span id="switchText">أنا</span>
      </div>
    </div>
    <button class="send-btn" id="sendButton">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- العناصر ----------
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const attachButton = document.getElementById('attachButton');
    const backButton = document.getElementById('backButton');
    const switchBtn = document.getElementById('switchSenderBtn');
    const switchIcon = document.getElementById('switchIcon');
    const switchText = document.getElementById('switchText');

    // ---------- الحالة ----------
    let currentSenderIsMe = true;   // true = أنا (يمين) , false = حبيبتي (يسار)
    
    // بيانات المحادثة الأولية (بين أنا وحبيبتي)
    const initialMessages = [
      { text: 'حبيبي، وحشتني أوي ❤️', sent: false, time: '09:30 م', read: true },
      { text: 'وأنا كمان وحشتيني، عاملة إيه النهاردة؟', sent: true, time: '09:32 م', read: true },
      { text: 'كنت بفكر فيك وأنا بعمل قهوة ☕️', sent: false, time: '09:33 م', read: true },
      { text: 'نفسي أشربها معاكي دلوقتي 😍', sent: true, time: '09:35 م', read: true },
      { text: 'يلا نتفق على مكالمة بليل؟', sent: false, time: '09:37 م', read: false }
    ];

    // ---------- دوال مساعدة ----------
    function getCurrentTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'م' : 'ص';
      hours = hours % 12 || 12;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      return `${hours}:${minutes} ${ampm}`;
    }

    // تحديث واجهة زر تبديل المرسل
    function updateSenderUI() {
      if (currentSenderIsMe) {
        switchIcon.className = 'fas fa-user-astronaut';
        switchText.textContent = 'أنا';
        messageInput.placeholder = 'اكتب رسالتك...';
      } else {
        switchIcon.className = 'fas fa-heart';
        switchText.textContent = 'حبيبتي';
        messageInput.placeholder = 'اكتبي رسالتك...';
      }
    }

    // إنشاء عنصر رسالة
    function createMessageElement(text, isSentByMe, timeStr = null, isRead = false) {
      const row = document.createElement('div');
      row.className = `message-row ${isSentByMe ? 'sent' : 'received'}`;

      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${isSentByMe ? 'sent-bubble' : 'received-bubble'}`;
      
      const textNode = document.createTextNode(text);
      bubble.appendChild(textNode);

      const metaDiv = document.createElement('div');
      metaDiv.className = 'message-meta';

      const timeSpan = document.createElement('span');
      timeSpan.className = 'message-time';
      timeSpan.textContent = timeStr || getCurrentTime();
      metaDiv.appendChild(timeSpan);

      if (isSentByMe) {
        const checkSpan = document.createElement('span');
        checkSpan.className = 'double-check';
        checkSpan.innerHTML = isRead 
          ? '<i class="fas fa-check-double" style="color: #7FC9FF;"></i>' 
          : '<i class="fas fa-check-double" style="opacity: 0.7;"></i>';
        metaDiv.appendChild(checkSpan);
      }

      bubble.appendChild(metaDiv);
      row.appendChild(bubble);
      return row;
    }

    // تحميل الرسائل الأولية
    function loadInitialMessages() {
      messagesContainer.innerHTML = '';
      initialMessages.forEach(msg => {
        messagesContainer.appendChild(createMessageElement(msg.text, msg.sent, msg.time, msg.read));
      });
      scrollToBottom();
    }

    // تمرير للأسفل
    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // إضافة رسالة جديدة
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      const time = getCurrentTime();
      const msgElement = createMessageElement(text, currentSenderIsMe, time, false);
      messagesContainer.appendChild(msgElement);
      messageInput.value = '';
      scrollToBottom();

      // محاكاة قراءة بعد لحظة (للرسائل المرسلة)
      if (currentSenderIsMe) {
        setTimeout(() => {
          const lastSentCheck = messagesContainer.querySelector('.message-row.sent:last-child .double-check i');
          if (lastSentCheck) lastSentCheck.style.color = '#7FC9FF';
        }, 1500);
      }
      messageInput.focus();
    }

    // ---------- ربط الأحداث ----------
    sendButton.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // زر تبديل المرسل
    switchBtn.addEventListener('click', () => {
      currentSenderIsMe = !currentSenderIsMe;
      updateSenderUI();
      messageInput.focus();
    });

    // زر المرفقات (تنبيه تجميلي)
    attachButton.addEventListener('click', () => {
      alert('📎 فتح معرض المرفقات (محاكاة)');
    });

    // زر العودة (يعود للصفحة الرئيسية)
    backButton.addEventListener('click', () => {
      // في التطبيق الحقيقي: window.location.href = 'index.html';
      alert('⬅️ العودة إلى قائمة المحادثات (الصفحة الرئيسية)');
      // window.location.href = 'index.html'; // فعّله عند الربط
    });

    // تحسينات للمس
    if ('ontouchstart' in window) {
      sendButton.addEventListener('touchstart', function(e) { this.style.transform = 'scale(0.92)'; }, { passive: true });
      sendButton.addEventListener('touchend', function() { this.style.transform = ''; });
    }

    // بدء التشغيل
    updateSenderUI();
    loadInitialMessages();

    // إعادة التمرير عند تغيير الحجم
    window.addEventListener('resize', () => {
      if (messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 50) {
        scrollToBottom();
      }
    });
  })();
</script>
</body>
</html>
